<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reading Companion</title>
  <style>
    :root {
      --fg: #1a1a1a;
      --muted: #666;
      --subtle: #999;
      --bg: #fafafa;
      --pane-bg: #fff;
      --border: #e5e5e5;
      --hover: #f1f5f9;
      --active: #dbeafe;
      --accent: #2563eb;
      --tag-bg: #f3f4f6;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    header {
      flex: 0 0 auto;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--pane-bg);
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    nav { display: flex; gap: 4px; }
    nav button {
      font: inherit;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
    }
    nav button:hover { background: var(--hover); }
    nav button.active {
      background: var(--active);
      color: var(--accent);
      border-color: #bfdbfe;
    }
    nav .count {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 4px;
    }
    main {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 0;
    }
    aside {
      border-right: 1px solid var(--border);
      background: var(--pane-bg);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .filter-wrap {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }
    .filter-wrap input {
      width: 100%;
      padding: 8px 10px;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }
    #list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      flex: 1 1 auto;
    }
    #list li {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    #list li:hover { background: var(--hover); }
    #list li.selected { background: var(--active); }
    #list .meta {
      font-size: 12px;
      color: var(--subtle);
      margin-bottom: 2px;
    }
    #list .title {
      font-weight: 500;
      line-height: 1.4;
    }
    #list .tags {
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    #list .tag {
      font-size: 11px;
      background: var(--tag-bg);
      padding: 1px 6px;
      border-radius: 4px;
      color: var(--muted);
    }
    #reader {
      overflow-y: auto;
      padding: 32px 40px;
      background: var(--pane-bg);
    }
    #reader .empty {
      color: var(--subtle);
      font-style: italic;
    }
    #reader .reader-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    #reader .reader-meta a { color: var(--accent); text-decoration: none; }
    #reader .reader-meta a:hover { text-decoration: underline; }
    .markdown { max-width: 740px; }
    .markdown h1, .markdown h2, .markdown h3 { line-height: 1.25; }
    .markdown h1 { font-size: 24px; margin: 0 0 16px; }
    .markdown h2 { font-size: 18px; margin: 28px 0 10px; }
    .markdown h3 { font-size: 16px; margin: 22px 0 8px; }
    .markdown p { margin: 0 0 14px; }
    .markdown ul, .markdown ol { margin: 0 0 14px; padding-left: 24px; }
    .markdown li { margin-bottom: 4px; }
    .markdown blockquote {
      margin: 0 0 14px;
      padding: 4px 16px;
      border-left: 3px solid var(--border);
      color: var(--muted);
    }
    .markdown code {
      font: 13px ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--tag-bg);
      padding: 1px 5px;
      border-radius: 3px;
    }
    .markdown pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
    }
    .markdown pre code { background: transparent; padding: 0; }
    .markdown a { color: var(--accent); }
    .markdown table {
      border-collapse: collapse;
      margin: 0 0 14px;
    }
    .markdown table th, .markdown table td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; grid-template-rows: minmax(200px, 35vh) 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
      #reader { padding: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Reading Companion</h1>
    <nav id="tabs">
      <button data-tab="articles" class="active">Articles <span class="count" data-count="articles"></span></button>
      <button data-tab="notes">Notes <span class="count" data-count="notes"></span></button>
      <button data-tab="concepts">Concepts <span class="count" data-count="concepts"></span></button>
    </nav>
  </header>

  <main>
    <aside>
      <div class="filter-wrap">
        <input id="filter" type="text" placeholder="Filter..." autocomplete="off" />
      </div>
      <ul id="list"></ul>
    </aside>

    <section id="reader">
      <div class="empty">Select an item to read.</div>
    </section>
  </main>

  <script type="module">
    import { marked } from "https://esm.sh/marked@11";
    import DOMPurify from "https://esm.sh/dompurify@3";

    marked.setOptions({ gfm: true, breaks: false });

    const $ = (sel) => document.querySelector(sel);
    const listEl = $("#list");
    const readerEl = $("#reader");
    const filterEl = $("#filter");

    const state = {
      manifest: null,
      tab: "articles",
      filter: "",
      selectedPath: null,
    };

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function renderList() {
      const items = state.manifest[state.tab] || [];
      const q = state.filter.trim().toLowerCase();
      const filtered = q
        ? items.filter((i) => {
            const hay = [i.title, i.source, ...(i.tags || []), ...(i.concepts || []), i.slug || ""]
              .filter(Boolean).join(" ").toLowerCase();
            return hay.includes(q);
          })
        : items;

      if (!filtered.length) {
        listEl.innerHTML = `<li style="cursor:default;color:var(--subtle);font-style:italic;">No items.</li>`;
        return;
      }

      listEl.innerHTML = filtered.map((item) => {
        const isSelected = item.path === state.selectedPath;
        const meta = state.tab === "concepts"
          ? (item.first_seen ? `first seen ${item.first_seen}` : "")
          : [item.date, item.source].filter(Boolean).join(" · ");
        const tags = (item.tags || []).slice(0, 4)
          .map((t) => `<span class="tag">${escapeHtml(t)}</span>`).join("");
        return `
          <li data-path="${escapeHtml(item.path)}" class="${isSelected ? "selected" : ""}">
            ${meta ? `<div class="meta">${escapeHtml(meta)}</div>` : ""}
            <div class="title">${escapeHtml(item.title)}</div>
            ${tags ? `<div class="tags">${tags}</div>` : ""}
          </li>
        `;
      }).join("");
    }

    function findItem(path) {
      for (const tab of ["articles", "notes", "concepts"]) {
        const m = (state.manifest[tab] || []).find((i) => i.path === path);
        if (m) return { tab, item: m };
      }
      return null;
    }

    function readerMeta(found) {
      const { tab, item } = found;
      if (tab === "articles") {
        const link = item.source_url
          ? `<a href="${escapeHtml(item.source_url)}" target="_blank" rel="noopener">original ↗</a>`
          : "";
        return `${escapeHtml(item.date || "")} · ${escapeHtml(item.source || "")} ${link ? "· " + link : ""}`;
      }
      if (tab === "notes") {
        return `${escapeHtml(item.date || "")} · note · ${escapeHtml(item.source || "")}`;
      }
      return `concept${item.first_seen ? " · first seen " + escapeHtml(item.first_seen) : ""}`;
    }

    async function openItem(path) {
      state.selectedPath = path;
      renderList();
      const found = findItem(path);
      if (!found) {
        readerEl.innerHTML = `<div class="empty">Not found in manifest.</div>`;
        return;
      }
      readerEl.innerHTML = `<div class="reader-meta">${readerMeta(found)}</div><div class="empty">Loading...</div>`;
      try {
        const res = await fetch(path + "?t=" + Date.now());
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        let text = await res.text();
        // Strip YAML frontmatter for cleaner reading view.
        if (text.startsWith("---\n")) {
          const end = text.indexOf("\n---", 4);
          if (end !== -1) text = text.slice(end + 4).replace(/^\n+/, "");
        }
        const html = DOMPurify.sanitize(marked.parse(text));
        readerEl.innerHTML = `
          <div class="reader-meta">${readerMeta(found)}</div>
          <article class="markdown">${html}</article>
        `;
        readerEl.scrollTop = 0;
      } catch (e) {
        readerEl.innerHTML = `<div class="reader-meta">${readerMeta(found)}</div><div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
      }
    }

    function setTab(tab) {
      state.tab = tab;
      state.filter = "";
      filterEl.value = "";
      document.querySelectorAll("#tabs button").forEach((b) => {
        b.classList.toggle("active", b.dataset.tab === tab);
      });
      renderList();
    }

    function setCounts() {
      for (const k of ["articles", "notes", "concepts"]) {
        const el = document.querySelector(`[data-count="${k}"]`);
        if (el) el.textContent = `(${(state.manifest[k] || []).length})`;
      }
    }

    document.querySelectorAll("#tabs button").forEach((b) => {
      b.addEventListener("click", () => setTab(b.dataset.tab));
    });
    listEl.addEventListener("click", (e) => {
      const li = e.target.closest("li[data-path]");
      if (li) openItem(li.dataset.path);
    });
    filterEl.addEventListener("input", () => {
      state.filter = filterEl.value;
      renderList();
    });

    async function init() {
      try {
        const res = await fetch("manifest.json?t=" + Date.now());
        if (!res.ok) throw new Error(`${res.status}`);
        state.manifest = await res.json();
      } catch (e) {
        readerEl.innerHTML = `<div class="empty">Could not load manifest.json. ${escapeHtml(e.message)}</div>`;
        return;
      }
      setCounts();
      renderList();
    }
    init();
  </script>
</body>
</html>
