name: Ingest inbox

on:
  schedule:
    - cron: "0 * * * *"  # hourly, best-effort
  workflow_dispatch:

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet httpx pyyaml

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/ingest_inbox.py

      - name: Regenerate manifest
        run: python scripts/generate_manifest.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/ manifest.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          NEW_ARTICLES=$(git diff --cached --name-only --diff-filter=A articles/ | wc -l | tr -d ' ')
          if [[ "$NEW_ARTICLES" -gt 0 ]]; then
            NEW_FILES=$(git diff --cached --name-only --diff-filter=A articles/ | head -5)
            git commit -m "Ingest ${NEW_ARTICLES} article(s) from inbox" -m "$NEW_FILES"
          else
            git commit -m "Refresh manifest"
          fi
          git push
